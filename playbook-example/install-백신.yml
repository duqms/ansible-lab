#------------------------------------------------------------------------#
기존 백신 삭제 후
신규 백신 설치 ( 공인 / 사설 구분하여 맞는 환경에 백신 프로그램 설치 )
#------------------------------------------------------------------------#

---
- name: Uninstall Program-1
  shell:
    echo "yes" | /opt/Program-1/scripts/uninstall.sh
  ignore_errors: true
#==============================================#
- name: Uninstall Program-2
  shell:
    echo "y" | /usr/local/Program-2/uninstall.sh
  ignore_errors: true
#==============================================#
- name: Make /home/users/utils/new-program
  file:
    path: /home/users/utils/new-program
    state: directory
    owner: root
    group: root
    mode: 0755
#==============================================#
- name: Get IP list all Interface
  shell: ip -o -4 addr show | awk '{print $4}' | cut -d'/' -f1
  register: ip_addresses
  changed_when: false
#==============================================#
- name: Message IP addresses
  debug:
    msg: "IP addresses: {{ ip_addresses.stdout_lines }}"
#==============================================#
- name: IP address Private IP & Public IP 
  set_fact:
    has_2_prefix: "{{ ip_addresses.stdout_lines | select('match', '^2') | list | length > 0 }}"
#==============================================#
- name: IP address Only Private IP
  set_fact:
    has_only_1_prefix: "{{ ip_addresses.stdout_lines | select('match', '^1') | list | length == ip_addresses.stdout_lines | length }}"
#==============================================#
- name: Copy File | Private IP & Public IP
  copy:
    #src: /var/lib/awx/projects/_8__gitlab_project/playbook/roles/install/new-program/files/new-program/Basic_Install_Linux_250417_x64.tar
    src: "roles/install/new-program/files/new-program/Basic_Install_Linux_250417_x64.tar"
    dest: /home/users/utils/new-program
  when: has_2_prefix
#==============================================#
- name: Copy File | Only Private IP
  copy:
    #src: /var/lib/awx/projects/_8__gitlab_project/playbook/roles/install/new-program/files/new-program/Private_Linux_250417_x64.tar
    src: "roles/install/new-program/files/new-program/Private_Linux_250417_x64.tar"
    dest: /home/users/utils/new-program
  when: has_only_1_prefix
#==============================================#
- name: Unarchive File | Private IP & Public IP
  shell: tar -xvf /home/users/utils/new-program/Basic_Install_Linux_250417_x64.tar -C /home/users/utils/new-program
  when: has_2_prefix
#==============================================#
- name: Unarchive File | Only Private IP
  shell: tar -xvf /home/bluesky/utils/new-program/Private_Linux_250417_x64.tar -C /home/bluesky/utils/new-program
  when: has_only_1_prefix
#==============================================#
- name: Change Mode installer
  shell: chmod +x /home/users/utils/new-program/installer
#==============================================#
- name: Install new-program
  shell: nohup /home/users/utils/new-program/installer > /tmp/new-program.log 2>&1 &
  async: 1
  poll: 0
