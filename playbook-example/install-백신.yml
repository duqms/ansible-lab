- name: Uninstall Traps
  shell:
    echo "yes" | /opt/traps/scripts/uninstall.sh
  ignore_errors: true
#==============================================#
- name: Uninstall V3
  shell:
    echo "y" | /usr/local/v3net/uninstall.sh
  ignore_errors: true
#==============================================#
- name: Uninstall bitdefender
  shell: /opt/bitdefender-security-tools/bin/./uninstall
  ignore_errors: true
#==============================================#
#- name: Uninstall bitdefender old version
#  shell: /opt/bitdefender-security-tools/bin/uninstall
#  ignore_errors: true
#==============================================#
#- name: Delete Install bitdefender File
#  shell: rm -rf /home/bluesky/utils/bitdefender/*
#  ignore_errors: true
#==============================================#
- name: Make /home/bluesky/utils/bitdefender
  file:
    path: /home/bluesky/utils/bitdefender
    state: directory
    owner: root
    group: root
    mode: 0755
#==============================================#
- name: Get IP list all Interface
  shell: ip -o -4 addr show | awk '{print $4}' | cut -d'/' -f1
  register: ip_addresses
  changed_when: false
#==============================================#
- name: Message IP addresses
  debug:
    msg: "IP addresses: {{ ip_addresses.stdout_lines }}"
#==============================================#
- name: IP address Private IP & Public IP 
  set_fact:
    has_2_prefix: "{{ ip_addresses.stdout_lines | select('match', '^2') | list | length > 0 }}"
#==============================================#
- name: IP address Only Private IP
  set_fact:
    has_only_1_prefix: "{{ ip_addresses.stdout_lines | select('match', '^1') | list | length == ip_addresses.stdout_lines | length }}"
#==============================================#
- name: Copy File | Private IP & Public IP
  copy:
    #src: /var/lib/awx/projects/_8__gitlab_project/playbook/roles/install/bitdefender-mokdong/files/bitdefender/Basic_Install_Linux_250417_x64.tar
    src: "roles/install/bitdefender-mokdong/files/bitdefender/Basic_Install_Linux_250417_x64.tar"
    dest: /home/bluesky/utils/bitdefender
  when: has_2_prefix
#==============================================#
- name: Copy File | Only Private IP
  copy:
    #src: /var/lib/awx/projects/_8__gitlab_project/playbook/roles/install/bitdefender-mokdong/files/bitdefender/Mokdong_Private_Linux_250417_x64.tar
    src: "roles/install/bitdefender-mokdong/files/bitdefender/Mokdong_Private_Linux_250417_x64.tar"
    dest: /home/bluesky/utils/bitdefender
  when: has_only_1_prefix
#==============================================#
- name: Unarchive File | Private IP & Public IP
  shell: tar -xvf /home/bluesky/utils/bitdefender/Basic_Install_Linux_250417_x64.tar -C /home/bluesky/utils/bitdefender
  when: has_2_prefix
#==============================================#
- name: Unarchive File | Only Private IP
  shell: tar -xvf /home/bluesky/utils/bitdefender/Mokdong_Private_Linux_250417_x64.tar -C /home/bluesky/utils/bitdefender
  when: has_only_1_prefix
#==============================================#
- name: Change Mode installer
  shell: chmod +x /home/bluesky/utils/bitdefender/installer
#==============================================#
- name: Install bitdefender
  shell: nohup /home/bluesky/utils/bitdefender/installer > /tmp/bitdefender_install.log 2>&1 &
  async: 1
  poll: 0
